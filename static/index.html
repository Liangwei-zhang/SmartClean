<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartClean - 登入</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .logo p {
            color: #666;
            font-size: 14px;
        }
        .user-type-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            background: #f0f0f0;
            border-radius: 12px;
            padding: 4px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: white;
            color: #4f46e5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e5e5;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-login:hover {
            background: #4338ca;
        }
        .btn-login:disabled {
            background: #999;
            cursor: not-allowed;
        }
        .error {
            color: #dc2626;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }
        .test-accounts {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e5e5e5;
        }
        .test-accounts h3 {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }
        .test-accounts p {
            font-size: 12px;
            color: #666;
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>🏠 SmartClean</h1>
            <p>清潔服務管理平台</p>
        </div>
        
        <div class="user-type-tabs">
            <button class="tab active" data-type="host">🏠 房東</button>
            <button class="tab" data-type="cleaner">👷 清潔員</button>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>手機號</label>
                <input type="tel" id="phone" value="888888" placeholder="輸入手機號" required>
            </div>
            <div class="form-group">
                <label>密碼</label>
                <input type="password" id="password" value="123456" placeholder="輸入密碼" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">登 入</button>
            <div class="error" id="errorMsg"></div>
        </form>
        
        <div class="test-accounts">
            <h3>測試帳號</h3>
            <p>房東: 888888 / 123456</p>
            <p>清潔員: 12345678 / 123456</p>
        </div>
    </div>
    
    <script>
        const API = '/api';
        let userType = 'host';
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                userType = tab.dataset.type;
            });
        });
        
        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btn.textContent = '登入中...';
            errorMsg.textContent = '';
            
            try {
                const res = await fetch(API + '/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone, password, user_type: userType})
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('user_type', userType);
                    localStorage.setItem('user_name', data.data.name);
                    localStorage.setItem('user_id', data.data.user_id);
                    localStorage.setItem('token', data.data.token);
                    if (userType === 'host') localStorage.setItem('host_phone', data.data.phone);
                    if (userType === 'cleaner') localStorage.setItem('cleaner_id', data.data.user_id);
                    
                    if (userType === 'host') window.location.href = 'host.html';
                    else if (userType === 'cleaner') window.location.href = 'cleaner.html';
                    else window.location.href = 'admin.html';
                } else {
                    errorMsg.textContent = data.detail || '登入失敗';
                }
            } catch(e) {
                errorMsg.textContent = '網絡錯誤';
            } finally {
                btn.disabled = false;
                btn.textContent = '登 入';
            }
        });
    </script>
</body>
</html>
