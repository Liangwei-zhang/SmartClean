<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartClean | 登錄</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }
        h1 { text-align: center; margin-bottom: 30px; color: #333; }
        .btn { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-host { background: #10b981; color: white; }
        .btn-cleaner { background: #3b82f6; color: white; }
        .btn-admin { background: #6366f1; color: white; }
        .btn-logout { background: #ef4444; color: white; margin-top: 20px; }
        .user-info { 
            text-align: center; 
            padding: 20px; 
            background: #f3f4f6; 
            border-radius: 10px; 
            margin-bottom: 20px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 SmartClean</h1>
        
        <!-- Not logged in -->
        <div id="loginPage">
            <button class="btn btn-host" onclick="loginAs('host')">🏠 房東登入</button>
            <button class="btn btn-cleaner" onclick="loginAs('cleaner')">👷 清潔員登入</button>
            <button class="btn btn-admin" onclick="loginAs('admin')">⚙️ 管理員登入</button>
        </div>
        
        <!-- Logged in -->
        <div id="userPage" class="hidden">
            <div class="user-info">
                <p>已登入為: <strong id="userName">-</strong></p>
                <p>類型: <span id="userType">-</span></p>
            </div>
            <button class="btn btn-host" onclick="goToPage('host')">🏠 進入房東頁面</button>
            <button class="btn btn-cleaner" onclick="goToPage('cleaner')">👷 進入清潔員頁面</button>
            <button class="btn btn-admin" onclick="goToPage('admin')">⚙️ 進入管理頁面</button>
            <button class="btn btn-logout" onclick="logout()">🚪 登出</button>
        </div>
    </div>

    <script>
        const API = '/api';
        
        // Check login status on load
        window.onload = function() {
            const userType = localStorage.getItem('user_type');
            const userName = localStorage.getItem('user_name');
            
            if (userType) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('userPage').classList.remove('hidden');
                document.getElementById('userName').textContent = userName || '用戶';
                document.getElementById('userType').textContent = userType === 'host' ? '房東' : userType === 'cleaner' ? '清潔員' : '管理員';
            }
        };
        
        async function loginAs(type) {
            const phone = prompt('請輸入手機號:');
            if (!phone) return;
            
            const password = prompt('請輸入密碼:');
            if (!password) return;
            
            try {
                const res = await fetch(API + '/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone, password, user_type: type})
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('user_type', type);
                    localStorage.setItem('host_phone', type === 'host' ? data.data.phone : '');
                    localStorage.setItem('cleaner_id', type === 'cleaner' ? data.data.user_id : '');
                    localStorage.setItem('user_name', data.data.name);
                    localStorage.setItem('user_id', data.data.user_id);
                    localStorage.setItem('host_phone', data.data.phone);
                    localStorage.setItem('token', data.data.token);
                    
                    // Redirect to appropriate page
                    if (type === 'host') window.location.href = 'host.html';
                    else if (type === 'cleaner') window.location.href = 'cleaner.html';
                    else window.location.href = 'admin.html';
                } else {
                    alert('登入失敗: ' + (data.detail || data.message));
                }
            } catch(e) {
                alert('網絡錯誤');
            }
        }
        
        function goToPage(type) {
            if (type === 'host') window.location.href = 'host.html';
            else if (type === 'cleaner') window.location.href = 'cleaner.html';
            else window.location.href = 'admin.html';
        }
        
        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
