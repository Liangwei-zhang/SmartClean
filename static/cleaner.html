<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartClean - 搶單大廳</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text-main); padding-bottom: 80px; }
        
        /* Header */
        .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3); }
        .header h1 { font-size: 24px; font-weight: 700; }
        .header .status { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 14px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
        .status-dot.offline { background: #ef4444; animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* Nav */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid var(--border); box-shadow: 0 -4px 20px rgba(0,0,0,0.05); z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 12px; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-item .icon { font-size: 24px; display: block; margin-bottom: 4px; }
        
        /* Sort Bar */
        .sort-bar { display: flex; gap: 8px; padding: 12px 16px; background: white; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .sort-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: white; font-size: 14px; font-weight: 500; color: var(--text-muted); white-space: nowrap; cursor: pointer; transition: all 0.2s; }
        .sort-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* Order List */
        .order-list { padding: 16px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--border); transition: transform 0.2s, box-shadow 0.2s; }
        .card:active { transform: scale(0.98); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .prop-name { font-weight: 700; font-size: 16px; }
        .price { font-size: 20px; font-weight: 800; color: var(--success); }
        
        .info-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        .info-row .label { color: var(--text-main); font-weight: 500; }
        
        .distance { color: var(--primary); font-weight: 600; }
        
        .btn-grab { width: 100%; padding: 14px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; font-size: 16px; font-weight: 700; border: none; cursor: pointer; margin-top: 12px; transition: all 0.2s; }
        .btn-grab:active { transform: scale(0.98); }
        .btn-grab:disabled { background: var(--text-muted); cursor: not-allowed; }
        
        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 48px; display: block; margin-bottom: 16px; }
        
        /* Loading */
        .loading { text-align: center; padding: 40px; color: var(--text-muted); }
        
        /* Toast */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
        .toast.show { opacity: 1; }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; }
        .modal h3 { margin-bottom: 16px; }
        .modal-btns { display: flex; gap: 12px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
        .modal-btn.cancel { background: var(--border); color: var(--text-muted); }
        .modal-btn.confirm { background: var(--primary); color: white; }
        
        /* Page */
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1>🧹 SmartClean 搶單大廳</h1>
        <div class="status">
            <span class="status-dot" id="wsStatus"></span>
            <span id="wsStatusText">連接中...</span>
        </div>
    </header>
    
    <!-- Sort Bar -->
    <div class="sort-bar" id="sortBar">
        <button class="sort-btn active" id="btnTime" onclick="toggleSort('time')">🕐 時間</button>
        <button class="sort-btn" id="btnDistance" onclick="toggleSort('distance')">📍 距離</button>
        <button class="sort-btn" id="btnPrice" onclick="toggleSort('price')">💰 金額</button>
    </div>
    
    <!-- Open Orders -->
    <div id="pageOpen" class="page active">
        <div class="order-list" id="openOrdersList">
            <div class="loading">載入中...</div>
        </div>
    </div>
    
    <!-- My Orders -->
    <div id="pageMy" class="page">
        <div class="order-list" id="myOrdersList">
            <div class="loading">載入中...</div>
        </div>
    </div>
    
    <!-- Profile -->
    <div id="pageProfile" class="page">
        <div class="order-list">
            <div class="card">
                <h3>👤 個人資料</h3>
                <div class="info-row"><span class="label">姓名:</span> <span id="profileName">-</span></div>
                <div class="info-row"><span class="label">電話:</span> <span id="profilePhone">-</span></div>
                <div class="info-row"><span class="label">已完成:</span> <span id="profileJobs">0</span> 單</div>
                <div class="info-row"><span class="label">評分:</span> <span id="profileRating">5.0</span> ⭐</div>
            </div>
            <button class="btn-grab" onclick="logout()" style="background: var(--danger);">🚪 登出</button>
        </div>
    </div>
    
    <!-- Nav -->
    <nav class="nav">
        <div class="nav-item active" onclick="showPage('pageOpen', this)">
            <span class="icon">📋</span>
            搶單
        </div>
        <div class="nav-item" onclick="showPage('pageMy', this)">
            <span class="icon">📝</span>
            我的
        </div>
        <div class="nav-item" onclick="showPage('pageProfile', this)">
            <span class="icon">👤</span>
            個人
        </div>
    </nav>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <!-- Login Modal -->
    <div class="modal-overlay show" id="loginModal">
        <div class="modal">
            <h3>🔐 登入</h3>
            <input type="text" id="loginPhone" placeholder="手機號" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;">
            <input type="password" id="loginPassword" placeholder="密碼" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;">
            <div class="modal-btns">
                <button class="modal-btn cancel" onclick="showRegister()">註冊</button>
                <button class="modal-btn confirm" onclick="login()">登入</button>
            </div>
        </div>
    </div>
    
    <!-- Register Modal -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal">
            <h3>📝 註冊</h3>
            <input type="text" id="regName" placeholder="姓名" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;">
            <input type="text" id="regPhone" placeholder="手機號" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;">
            <input type="password" id="regPassword" placeholder="密碼" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;">
            <div class="modal-btns">
                <button class="modal-btn cancel" onclick="showLogin()">登入</button>
                <button class="modal-btn confirm" onclick="register()">註冊</button>
            </div>
        </div>
    </div>

    <script>
        // Config
        const API = window.location.origin + '/api';
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        
        // State
        let cleanerId = localStorage.getItem('cleanerId');
        let cleanerName = localStorage.getItem('cleanerName');
        let token = localStorage.getItem('token');
        let ws = null;
        let currentSort = { type: 'time', desc: true };
        
        // Init
        if (cleanerId) {
            document.getElementById('loginModal').classList.remove('show');
            initApp();
        }
        
        async function initApp() {
            await loadProfile();
            loadOpenOrders();
            loadMyOrders();
            connectWebSocket();
        }
        
        // Auth
        async function login() {
            const phone = document.getElementById('loginPhone').value;
            const password = document.getElementById('loginPassword').value;
            
            const res = await fetch(API + '/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phone, password, user_type: 'cleaner'})
            });
            const data = await res.json();
            
            if (data.success) {
                token = data.data.token;
                cleanerId = data.data.user_id;
                cleanerName = data.data.name;
                localStorage.setItem('token', token);
                localStorage.setItem('cleanerId', cleanerId);
                localStorage.setItem('cleanerName', cleanerName);
                document.getElementById('loginModal').classList.remove('show');
                initApp();
            } else {
                showToast(data.message || '登入失敗');
            }
        }
        
        async function register() {
            const name = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            
            const res = await fetch(API + '/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, phone, password, user_type: 'cleaner'})
            });
            const data = await res.json();
            
            if (data.success) {
                showToast('註冊成功，請登入');
                showLogin();
            } else {
                showToast(data.message || '註冊失敗');
            }
        }
        
        function showLogin() {
            document.getElementById('registerModal').classList.remove('show');
            document.getElementById('loginModal').classList.add('show');
        }
        
        function showRegister() {
            document.getElementById('loginModal').classList.remove('show');
            document.getElementById('registerModal').classList.add('show');
        }
        
        function logout() {
            localStorage.clear();
            location.reload();
        }
        
        // Profile
        async function loadProfile() {
            if (!cleanerId) return;
            
            const res = await fetch(API + '/cleaners/' + cleanerId);
            const data = await res.json();
            
            if (data.success) {
                document.getElementById('profileName').textContent = cleanerName;
                document.getElementById('profilePhone').textContent = data.data.phone;
                document.getElementById('profileJobs').textContent = data.data.total_jobs;
                document.getElementById('profileRating').textContent = data.data.rating;
            }
        }
        
        // Orders
        async function loadOpenOrders() {
            showLoading('openOrdersList');
            
            const res = await fetch(API + '/orders?status=open');
            const data = await res.json();
            
            if (!data.success) {
                document.getElementById('openOrdersList').innerHTML = '<div class="empty-state">載入失敗</div>';
                return;
            }
            
            let orders = data.data;
            
            // Get user location & calculate distances
            const userLoc = await getUserLocation();
            
            if (userLoc) {
                await Promise.all(orders.map(async o => {
                    const addr = o.property_address || o.property_name;
                    const loc = await geocodeAddress(addr);
                    if (loc) {
                        o.distance = calcDistance(userLoc.lat, userLoc.lng, loc.lat, loc.lng);
                    }
                }));
            }
            
            // Sort
            orders.sort((a, b) => {
                if (currentSort.type === 'price') {
                    return currentSort.desc ? b.price - a.price : a.price - b.price;
                } else if (currentSort.type === 'distance') {
                    const da = a.distance || 999999;
                    const db = b.distance || 999999;
                    return currentSort.desc ? db - da : da - db;
                } else {
                    return currentSort.desc ? 
                        (b.created_at || '').localeCompare(a.created_at || '') :
                        (a.created_at || '').localeCompare(b.created_at || '');
                }
            });
            
            renderOrders(orders, 'openOrdersList');
        }
        
        async function loadMyOrders() {
            showLoading('myOrdersList');
            
            const res = await fetch(API + '/orders');
            const data = await res.json();
            
            if (!data.success) {
                document.getElementById('myOrdersList').innerHTML = '<div class="empty-state">載入失敗</div>';
                return;
            }
            
            const orders = data.data.filter(o => o.cleaner_id == cleanerId && o.status !== 'completed');
            
            document.getElementById('myOrdersList').innerHTML = orders.length ? 
                orders.reverse().map(o => renderOrderCard(o, false)).join('') :
                '<div class="empty-state"><span class="empty-icon">📝</span>暫無訂單</div>';
        }
        
        function renderOrders(orders, elementId) {
            const list = document.getElementById(elementId);
            
            if (!orders.length) {
                list.innerHTML = '<div class="empty-state"><span class="empty-icon">📥</span>目前沒有新任務</div>';
                return;
            }
            
            list.innerHTML = orders.map(o => renderOrderCard(o, true)).join('');
        }
        
        function renderOrderCard(o, showGrabBtn) {
            const statusColors = {
                'open': '#10b981',
                'accepted': '#2563eb',
                'arrived': '#f59e0b',
                'completed': '#64748b',
                'cancelled': '#ef4444'
            };
            
            return `
                <div class="card">
                    <div class="card-header">
                        <div class="prop-name">${o.property_name || '未命名房源'}</div>
                        <div class="price">$${o.price}</div>
                    </div>
                    <div class="info-row">📍 ${o.property_address || '-'}</div>
                    ${o.distance !== undefined ? `<div class="info-row">📏 <span class="distance">${o.distance.toFixed(1)} km</span></div>` : ''}
                    <div class="info-row">🕐 退房時間: ${formatTime(o.checkout_time)}</div>
                    <div class="info-row">📊 狀態: <span style="color:${statusColors[o.status]}">${o.status}</span></div>
                    ${showGrabBtn ? `<button class="btn-grab" onclick="acceptOrder(${o.id})">✋ 立即搶單</button>` : ''}
                </div>
            `;
        }
        
        async function acceptOrder(orderId) {
            if (!cleanerId) {
                showToast('請先登入');
                return;
            }
            
            const res = await fetch(API + '/orders/' + orderId + '/accept', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cleaner_id: parseInt(cleanerId), cleaner_name: cleanerName})
            });
            
            const data = await res.json();
            
            if (data.success) {
                showToast('🎉 搶單成功！');
                loadOpenOrders();
                loadMyOrders();
            } else {
                showToast(data.detail || '搶單失敗');
                loadOpenOrders();
            }
        }
        
        // Sort
        function toggleSort(type) {
            if (currentSort.type === type) {
                currentSort.desc = !currentSort.desc;
            } else {
                currentSort.type = type;
                currentSort.desc = true;
            }
            
            ['time', 'distance', 'price'].forEach(t => {
                const btn = document.getElementById('btn' + t.charAt(0).toUpperCase() + t.slice(1));
                btn.classList.toggle('active', currentSort.type === t);
                btn.innerHTML = (t === 'price' ? '💰 金額' : t === 'distance' ? '📍 距離' : '🕐 時間') + (currentSort.type === t ? (currentSort.desc ? ' ↓' : ' ↑') : '');
            });
            
            loadOpenOrders();
        }
        
        // WebSocket
        function connectWebSocket() {
            const wsUrl = wsProtocol + '//' + window.location.host + '/api/orders/ws/orders';
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                document.getElementById('wsStatus').classList.remove('offline');
                document.getElementById('wsStatusText').textContent = '已連接';
            };
            
            ws.onclose = () => {
                document.getElementById('wsStatus').classList.add('offline');
                document.getElementById('wsStatusText').textContent = '斷線，重新連接...';
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                
                if (msg.type === 'new_order') {
                    showToast('📢 新訂單來了！');
                    loadOpenOrders();
                } else if (msg.type === 'order_accepted') {
                    loadOpenOrders();
                }
            };
        }
        
        // Location
        function getUserLocation() {
            return new Promise(resolve => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => resolve({lat: pos.coords.latitude, lng: pos.coords.longitude}),
                        () => resolve(null)
                    );
                } else {
                    resolve(null);
                }
            });
        }
        
        const geocodeCache = {};
        async function geocodeAddress(address) {
            if (geocodeCache[address]) return geocodeCache[address];
            try {
                const res = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(address));
                const data = await res.json();
                if (data && data[0]) {
                    const result = {lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon)};
                    geocodeCache[address] = result;
                    return result;
                }
            } catch(e) {}
            return null;
        }
        
        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        
        // Utils
        function formatTime(isoString) {
            if (!isoString) return '-';
            try {
                const d = new Date(isoString);
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            } catch(e) { return isoString; }
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function showLoading(elementId) {
            document.getElementById(elementId).innerHTML = '<div class="loading">載入中...</div>';
        }
        
        function showPage(pageId, navEl) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            navEl.classList.add('active');
        }
    </script>
</body>
</html>
