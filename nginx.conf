# SmartClean Nginx — 100萬日活生產調優
# 目標: 1000+ RPS, <10ms 靜態資源, WebSocket 萬級並發

worker_processes auto;        # 自動匹配 CPU 核心數
worker_rlimit_nofile 65535;   # 每個 worker 最大文件描述符

events {
    worker_connections  16384;  # 每 worker 最大連接 (total = workers × 16384)
    use epoll;                   # Linux 高效 I/O 模型
    multi_accept on;             # 一次接受所有待處理連接
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 基礎性能優化
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    keepalive_requests 1000;
    server_tokens      off;      # 隱藏版本號

    # 請求緩衝 (防止慢速攻擊)
    client_body_buffer_size    128k;
    client_max_body_size       15m;
    client_header_buffer_size  4k;
    client_header_timeout      10s;
    client_body_timeout        30s;
    send_timeout               30s;

    # 連接限制 (每IP每秒請求數)
    limit_req_zone  $binary_remote_addr zone=api:20m   rate=100r/s;
    limit_req_zone  $binary_remote_addr zone=login:10m rate=5r/s;
    limit_req_zone  $binary_remote_addr zone=upload:5m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # Gzip 壓縮 (減少 60-80% 傳輸量)
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types        text/plain text/css text/xml application/json application/javascript
                      application/xml+rss text/javascript image/svg+xml;

    # 上游 API (pool + keepalive)
    upstream api_backend {
        server api:8000;
        keepalive          64;    # 維持 64 個 keepalive 連接
        keepalive_requests 1000;
        keepalive_timeout  60s;
    }

    # HTTP → HTTPS
    server {
        listen 80;
        listen [::]:80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # 現代 TLS 設定
        ssl_protocols             TLSv1.3 TLSv1.2;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:50m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # 安全頭
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(self), camera=()" always;

        # 靜態資源 (永久緩存 + 零拷貝)
        location /static/ {
            alias /app/static/;
            sendfile on; tcp_nopush on;
            expires    1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /uploads/ {
            alias /app/uploads/;
            sendfile on;
            expires  30d;
            add_header Cache-Control "public";
            # 禁止直接上傳訪問腳本類文件
            location ~* \.(php|asp|jsp|sh|cgi)$ { deny all; }
            access_log off;
        }

        # 登入限速 (每秒 5 次)
        location /api/auth/login {
            limit_req  zone=login burst=10 nodelay;
            limit_conn perip 20;
            proxy_pass http://api_backend/api/auth/login;
            include    proxy_params;
        }

        # 上傳限速 (每秒 10 次)
        location /api/upload/ {
            limit_req  zone=upload burst=20 nodelay;
            limit_conn perip 5;
            client_max_body_size 16m;
            proxy_pass http://api_backend/api/upload/;
            include    proxy_params;
        }

        # API 路由 (一般限速)
        location /api/ {
            limit_req  zone=api burst=200 nodelay;
            limit_conn perip 100;
            proxy_pass http://api_backend/api/;
            include    proxy_params;
        }

        # WebSocket (長連接，無超時)
        location /api/orders/ws/ {
            proxy_pass         http://api_backend/api/orders/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # SPA 前端
        location / {
            root /app/static;
            try_files $uri $uri/ /index.html;
        }
    }
}

# ── proxy_params (inline) ───────────────────────────────────────────────────
# 創建 /etc/nginx/proxy_params:
# proxy_http_version 1.1;
# proxy_set_header   Connection "";
# proxy_set_header   Host              $host;
# proxy_set_header   X-Real-IP         $remote_addr;
# proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
# proxy_set_header   X-Forwarded-Proto $scheme;
# proxy_connect_timeout 5s;
# proxy_send_timeout    30s;
# proxy_read_timeout    30s;
# proxy_buffer_size     4k;
# proxy_buffers         8 4k;
